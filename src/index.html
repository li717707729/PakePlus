let nowData = ktData;
let allBrands = [];

// 切换品类
function switchType(type,dom){
    document.querySelectorAll('.tab button').forEach(b=>b.classList.remove('active'));
    dom.classList.add('active');
    nowType = type;
    if(type === 'kt'){
        nowData = ktData;
    }else if(type === 'bx'){
        nowData = bxData;
    }else if(type === 'xyj'){
        nowData = xyjData;
    }
    initBrands();
    search();
}

// 初始化品牌下拉
function initBrands(){
    allBrands = [...new Set(nowData.map(item=>item.brand))];
    let optionList = document.getElementById('optionList');
    optionList.innerHTML = `<div onclick="selectBrand('all')">全部品牌</div>`;
    allBrands.forEach(brand=>{
        optionList.innerHTML += `<div onclick="selectBrand('${brand}')">${brand}</div>`;
    });
}

// 选择品牌
function selectBrand(brand){
    selectedBrand = brand;
    document.getElementById('selectedText').innerText = brand === 'all' ? '全部品牌' : brand;
    document.getElementById('optionList').style.display = 'none';
    search();
}

// 显示/隐藏品牌下拉
function toggleList(){
    let list = document.getElementById('optionList');
    list.style.display = list.style.display === 'block' ? 'none' : 'block';
}

// 点击其他地方关闭下拉
document.addEventListener('click',function(e){
    let select = document.getElementById('customSelect');
    let list = document.getElementById('optionList');
    if(!select.contains(e.target) && !list.contains(e.target)){
        list.style.display = 'none';
    }
});

// 搜索功能
function search(){
    let brandInput = document.getElementById('brandInput').value.trim().toLowerCase();
    let codeInput = document.getElementById('codeInput').value.trim().toLowerCase();
    let filter = [...nowData];

    // 品牌筛选
    if(selectedBrand !== 'all'){
        filter = filter.filter(item=>item.brand === selectedBrand);
    }
    if(brandInput){
        filter = filter.filter(item=>item.brand.toLowerCase().includes(brandInput));
    }

    // 代码筛选
    if(codeInput){
        filter = filter.filter(item=>item.code.toLowerCase().includes(codeInput));
    }

    // 渲染结果
    let resultBox = document.getElementById('resultBox');
    if(filter.length === 0){
        resultBox.innerHTML = `<div class="empty">暂无匹配的故障代码</div>`;
        return;
    }

    let html = '';
    filter.forEach(item=>{
        let typeName = '';
        if(nowType === 'kt') typeName = '空调';
        else if(nowType === 'bx') typeName = '冰箱';
        else if(nowType === 'xyj') typeName = '洗衣机';
        html += `
        <div class="item">
            <span class="brand-tag">${item.brand}</span>
            <span class="type-tag">${typeName}</span>
            <span class="code-tag">${item.code}</span>
            <span class="info-text">${item.info}</span>
        </div>
        `;
    });
    resultBox.innerHTML = html;
}

// 初始化
initBrands();
search();
</script>
